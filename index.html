<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mi Biblioteca Nativa</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 15px; background: #f8f9fa; text-align: center; margin: 0; }
        .container { max-width: 500px; margin: auto; padding: 10px; }
        .card { background: white; padding: 20px; border-radius: 12px; margin-top: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: none; }
        img { max-width: 130px; margin-top: 15px; border-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
        
        /* Botón estilizado que activa la cámara nativa */
        .btn-captura { background: #007bff; color: white; border: none; padding: 14px 28px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; max-width: 280px; margin: 20px auto; display: block; text-decoration: none; }
        .btn-captura:active { background: #0056b3; }
        #info-estado { color: #666; font-size: 14px; margin-top: 10px; font-style: italic; }
        
        /* Ocultamos el input de tipo archivo real */
        #input-camara { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Mi Biblioteca</h1>
        <p style="color: #666; margin-bottom: 20px;">Toma una foto al código de barras del libro</p>
        
        <!-- Al pulsar esta etiqueta, Android simula el clic en el input de abajo -->
        <label for="input-camara" class="btn-captura">Abrir Cámara de Fotos</label>
        
        <!-- ESTE ES EL SECRETO ESTILO DOCUWARE: Abre la cámara trasera nativa del Xiaomi -->
        <input type="file" id="input-camara" accept="image/*" capture="environment" onchange="procesarFotoLibro(event)">
        
        <div id="info-estado">Estado: Esperando captura...</div>

        <!-- Ficha del libro resultado -->
        <div id="resultado" class="card">
            <h2 id="libro-titulo" style="margin: 0 0 10px 0; font-size: 20px;"></h2>
            <p id="libro-autor" style="color: #555; margin: 0; font-size: 16px;"></p>
            <img id="libro-portada" src="" alt="Portada">
            <div style="margin-top: 20px;">
                <button onclick="guardarLibro()" style="background: #28a745; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: bold;">Guardar en Biblioteca</button>
            </div>
        </div>
    </div>

    <script>
        let libroActual = {};

        function actualizarEstado(txt) {
            document.getElementById('info-estado').innerText = "Estado: " + txt;
        }

        function procesarFotoLibro(event) {
            const file = event.target.files[0];
            if (!file) return;

            actualizarEstado("Leyendo código de barras desde la imagen...");

            // Usamos una API en la nube gratuita para leer el código de barras de la foto
            const formData = new FormData();
            formData.append("file", file);

            // Consultamos a la API de ZXing (un lector de códigos de barras online muy rápido)
            fetch("https://zxing.org", {
                method: "POST",
                body: formData
            })
            .then(response => response.text())
            .then(htmlText => {
                // Parseamos el resultado HTML para extraer el número ISBN decodificado
                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlText, "text/html");
                const thElements = doc.querySelectorAll("th");
                
                let isbnEncontrado = null;
                thElements.forEach(th => {
                    if (th.innerText.trim() === "Parsed Result Type") {
                        const td = th.nextElementSibling;
                        if (td && td.innerText.trim() === "ISBN") {
                            // Si detecta un ISBN, buscamos el valor del texto crudo
                            const rawTextTh = Array.from(doc.querySelectorAll("th")).find(el => el.innerText.trim() === "Raw text");
                            if (rawTextTh) isbnEncontrado = rawTextTh.nextElementSibling.innerText.trim();
                        }
                    }
                });

                if (isbnEncontrado) {
                    actualizarEstado("ISBN detectado (" + isbnEncontrado + "). Buscando datos...");
                    buscarLibroPorISBN(isbnEncontrado);
                } else {
                    actualizarEstado("No se distinguió el código de barras claramente. Inténtalo de nuevo enfocando mejor.");
                }
            })
            .catch(err => {
                actualizarEstado("Error al procesar la imagen en el servidor.");
                console.error(err);
            });
        }

        async function buscarLibroPorISBN(isbn) {
            const url = `https://googleapis.com{isbn}`;
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.totalItems > 0) {
                    const info = data.items[0].volumeInfo; // Corregido: añadida posición exacta del array de items
                    libroActual = {
                        titulo: info.title,
                        autores: info.authors ? info.authors.join(', ') : 'Autor desconocido',
                        portada: info.imageLinks ? info.imageLinks.thumbnail.replace('http://', 'https://') : 'https://placeholder.com'
                    };

                    document.getElementById('libro-titulo').innerText = libroActual.titulo;
                    document.getElementById('libro-autor').innerText = "Por: " + libroActual.autores;
                    document.getElementById('libro-portada').src = libroActual.portada;
                    document.getElementById('resultado').style.display = 'block';
                    actualizarEstado("¡Libro encontrado!");
                } else {
                    actualizarEstado("El código leído no coincide con ningún libro registrado.");
                }
            } catch (error) {
                actualizarEstado("Error de conexión al buscar los datos del libro.");
                console.error(error);
            }
        }

        function guardarLibro() {
            let biblioteca = JSON.parse(localStorage.getItem('misLibros')) || [];
            biblioteca.push(libroActual);
            localStorage.setItem('misLibros', JSON.stringify(biblioteca));
            actualizarEstado("Libro guardado en el almacenamiento del móvil.");
            alert("¡Libro guardado con éxito!");
            document.getElementById('resultado').style.display = 'none';
        }
    </script>
</body>
</html>
