<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mi Biblioteca Nativa</title>
    <!-- Librería secundaria de respaldo por si el navegador es antiguo -->
    <script src="https://unpkg.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 15px; background: #f8f9fa; text-align: center; margin: 0; }
        .container { max-width: 500px; margin: auto; padding: 10px; }
        .card { background: white; padding: 20px; border-radius: 12px; margin-top: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: none; }
        img { max-width: 130px; margin-top: 15px; border-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
        .btn-captura { background: #007bff; color: white; border: none; padding: 14px 28px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; max-width: 280px; margin: 20px auto; display: block; text-decoration: none; }
        .btn-captura:active { background: #0056b3; }
        #info-estado { color: #666; font-size: 14px; margin-top: 10px; font-style: italic; }
        #input-camara { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Mi Biblioteca</h1>
        <p style="color: #666; margin-bottom: 20px;">Toma una foto nítida al código de barras del libro</p>
        
        <label for="input-camara" class="btn-captura">Abrir Cámara de Fotos</label>
        <input type="file" id="input-camara" accept="image/*" capture="environment" onchange="procesarFotoLibro(event)">
        
        <div id="info-estado">Estado: Esperando captura...</div>

        <!-- Ficha del libro resultado -->
        <div id="resultado" class="card">
            <h2 id="libro-titulo" style="margin: 0 0 10px 0; font-size: 20px;"></h2>
            <p id="libro-autor" style="color: #555; margin: 0; font-size: 16px;"></p>
            <img id="libro-portada" src="" alt="Portada">
            <div style="margin-top: 20px;">
                <button onclick="guardarLibro()" style="background: #28a745; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: bold;">Guardar en Biblioteca</button>
            </div>
        </div>
    </div>

    <script>
        let libroActual = {};

        function actualizarEstado(txt) {
            document.getElementById('info-estado').innerText = "Estado: " + txt;
        }

        function procesarFotoLibro(event) {
            const file = event.target.files[0];
            if (!file) return;

            actualizarEstado("Comprimiendo y analizando imagen...");

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    // Reducimos la foto del Xiaomi a un tamaño manejable (max 1000px) para optimizar el lector
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const maxDim = 1000;
                    let w = img.width;
                    let h = img.height;
                    
                    if (w > h && w > maxDim) { h *= maxDim / w; w = maxDim; }
                    else if (h > maxDim) { w *= maxDim / h; h = maxDim; }
                    
                    canvas.width = w;
                    canvas.height = h;
                    ctx.drawImage(img, 0, 0, w, h);

                    // Intentamos leer el código de barras localmente
                    const codeReader = new ZXingJS.BrowserBarcodeReader();
                    codeReader.decodeFromCanvas(canvas)
                        .then(result => {
                            const isbn = result.text;
                            actualizarEstado("ISBN detectado: " + isbn + ". Buscando libro...");
                            buscarLibroPorISBN(isbn);
                        })
                        .catch(err => {
                            actualizarEstado("No se detectó el código. Asegúrate de que esté bien enfocado, iluminado y salga recto en la foto.");
                            console.error(codeReader);
                        });
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function buscarLibroPorISBN(isbn) {
            // Limpiamos posibles guiones si el código se leyó con formato extendido
            const isbnLimpio = isbn.replace(/[- ]/g, "");
            const url = `https://googleapis.com{isbnLimpio}`;
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.totalItems > 0) {
                    const info = data.items[0].volumeInfo;
                    libroActual = {
                        titulo: info.title,
                        autores: info.authors ? info.authors.join(', ') : 'Autor desconocido',
                        portada: info.imageLinks ? info.imageLinks.thumbnail.replace('http://', 'https://') : 'https://placeholder.com'
                    };

                    document.getElementById('libro-titulo').innerText = libroActual.titulo;
                    document.getElementById('libro-autor').innerText = "Por: " + libroActual.autores;
                    document.getElementById('libro-portada').src = libroActual.portada;
                    document.getElementById('resultado').style.display = 'block';
                    actualizarEstado("¡Libro encontrado!");
                } else {
                    actualizarEstado("Código leído (" + isbnLimpio + "), pero no está registrado en Google Books.");
                }
            } catch (error) {
                actualizarEstado("Error al conectar con el servidor de Google.");
                console.error(error);
            }
        }

        function guardarLibro() {
            let biblioteca = JSON.parse(localStorage.getItem('misLibros')) || [];
            biblioteca.push(libroActual);
            localStorage.setItem('misLibros', JSON.stringify(biblioteca));
            actualizarEstado("Libro guardado en tu móvil.");
            alert("¡Libro guardado con éxito!");
            document.getElementById('resultado').style.display = 'none';
        }
    </script>
</body>
</html>
