<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mi Biblioteca v1.4.9</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 15px; background: #f8f9fa; text-align: center; margin: 0; }
        .container { max-width: 500px; margin: auto; padding: 10px; }
        .version-tag { font-size: 11px; color: #aaa; margin-top: -10px; margin-bottom: 20px; }
        
        #video-container { width: 100%; max-width: 360px; margin: 15px auto; background: #000; border-radius: 12px; overflow: hidden; position: relative; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        video { width: 100%; height: auto; display: block; }
        
        .laser { position: absolute; top: 50%; left: 5%; width: 90%; height: 2px; background-color: red; box-shadow: 0 0 8px red; animation: laserAnim 2s infinite alternate; }
        @keyframes laserAnim { from { top: 35%; } to { top: 65%; } }

        .card { background: white; padding: 20px; border-radius: 12px; margin-top: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: none; }
        img { max-width: 130px; margin-top: 15px; border-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
        button { background: #007bff; color: white; border: none; padding: 14px 28px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; max-width: 280px; margin: 10px auto; display: block; }
        button:active { background: #0056b3; }
        
        #isbn-bloque { background: #e9ecef; padding: 8px 15px; border-radius: 20px; font-weight: bold; color: #495057; margin: 15px auto 5px auto; font-size: 14px; display: block; max-width: 200px; border: 1px solid #ced4da; }
        #info-estado { color: #555; font-size: 14px; margin: 5px 0 15px 0; font-weight: 500; font-style: italic; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Mi Biblioteca</h1>
        <div class="version-tag">Versión de la App: v1.4.9</div>
        
        <button id="btn-iniciar" onclick="comenzarEscaneoEnVivo()">Iniciar Escáner en Vivo</button>
        
        <div id="video-container">
            <video id="webcam" autoplay playsinline></video>
            <div class="laser"></div>
        </div>

        <div id="isbn-bloque">ISBN: <span id="num-isbn">Ninguno</span></div>
        <div id="info-estado">Estado: En espera...</div>

        <div id="resultado" class="card">
            <h2 id="libro-titulo" style="margin: 0 0 10px 0; font-size: 20px;"></h2>
            <p id="libro-autor" style="color: #555; margin: 0; font-size: 16px;"></p>
            <img id="libro-portada" src="" alt="Portada">
            <div style="margin-top: 20px;">
                <button onclick="guardarLibro()" style="background: #28a745;">Guardar en Biblioteca</button>
            </div>
        </div>
    </div>

    <script>
        let streamActual = null;
        let animationFrameId = null;
        let detectorDeCodigos = null;
        let libroActual = {};
        let escaneando = false;

        function actualizarEstado(txt) {
            document.getElementById('info-estado').innerText = "Acción: " + txt;
        }

        async function comenzarEscaneoEnVivo() {
            if (!('BarcodeDetector' in window)) {
                actualizarEstado("Navegador incompatible con escáner nativo.");
                return;
            }

            document.getElementById('btn-iniciar').style.display = 'none';
            document.getElementById('resultado').style.display = 'none';
            document.getElementById('num-isbn').innerText = "Esperando lectura...";
            actualizarEstado("Conectando con la cámara trasera...");

            detectorDeCodigos = new BarcodeDetector({ formats: ['ean_13', 'ean_8'] });

            try {
                const constraints = {
                    video: {
                        facingMode: "environment",
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    }
                };
                
                streamActual = await navigator.mediaDevices.getUserMedia(constraints);
                const video = document.getElementById('webcam');
                video.srcObject = streamActual;
                
                document.getElementById('video-container').style.display = 'block';
                actualizarEstado("Escáner activo. Enfoca el código de barras...");
                escaneando = true;

                video.onloadedmetadata = () => {
                    procesarFrameEnVivo();
                };

            } catch (err) {
                console.error(err);
                actualizarEstado("Error al abrir cámara. Verifica permisos.");
                document.getElementById('btn-iniciar').style.display = 'block';
            }
        }

        function procesarFrameEnVivo() {
            if (!escaneando || !detectorDeCodigos) return;

            const video = document.getElementById('webcam');
            
            detectorDeCodigos.detect(video)
                .then(barcodes => {
                    if (barcodes.length > 0 && escaneando) {
                        // DETECCIÓN EXITOSA: Frenamos en seco antes de cualquier otra cosa
                        escaneando = false;
                        const isbnOriginal = barcodes[0].rawValue;
                        
                        // DESTRUCCIÓN DE INSTANCIAS: Forzamos la muerte del hardware de la cámara
                        detectorDeCodigos = null; 
                        detenerCamara();
                        
                        const isbnLimpio = isbnOriginal.trim().replace(/[^0-9X]/gi, "");
                        document.getElementById('num-isbn').innerText = isbnLimpio;
                        
                        actualizarEstado("Descargando ficha de libro por túnel seguro...");
                        
                        // Retrasamos la petición 100ms para asegurar que el Xiaomi liberó la cámara
                        setTimeout(() => {
                            buscarLibroPorISBN(isbnLimpio);
                        }, 100);
                    } else {
                        if (escaneando) {
                            animationFrameId = requestAnimationFrame(procesarFrameEnVivo);
                        }
                    }
                })
                .catch(err => {
                    console.error(err);
                    if (escaneando) {
                        animationFrameId = requestAnimationFrame(procesarFrameEnVivo);
                    }
                });
        }

        function detenerCamara() {
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }
            if (streamActual) {
                streamActual.getTracks().forEach(track => track.stop());
                streamActual = null;
            }
            document.getElementById('video-container').style.display = 'none';
            document.getElementById('btn-iniciar').style.display = 'block';
        }

        async function buscarLibroPorISBN(isbn) {
            const destinoAPI = "https://googleapis.com:" + isbn;
            const urlConProxy = "https://corsproxy.io" + encodeURIComponent(destinoAPI);
            
            try {
                const response = await fetch(urlConProxy);
                const data = await response.json();
                
                if (data && data.totalItems > 0 && data.items && data.items.length > 0) {
                    const info = data.items[0].volumeInfo; // Corregido: añadida posición exacta del array de items
                    
                    let nombresAutores = 'Autor desconocido';
                    if (info.authors && info.authors.length > 0) {
                        nombresAutores = info.authors.join(', ');
                    }

                    let urlPortada = 'https://placeholder.com';
                    if (info.imageLinks && info.imageLinks.thumbnail) {
                        urlPortada = info.imageLinks.thumbnail.replace('http://', 'https://');
                    }

                    libroActual = { 
                        titulo: info.title, 
                        autores: nombresAutores, 
                        portada: urlPortada 
                    };
                    
                    document.getElementById('libro-titulo').innerText = libroActual.titulo;
                    document.getElementById('libro-autor').innerText = "Por: " + libroActual.autores;
                    document.getElementById('libro-portada').src = libroActual.portada;
                    document.getElementById('resultado').style.display = 'block';
                    
                    actualizarEstado("¡Libro cargado con éxito!");
                } else {
                    actualizarEstado("No encontrado en el registro global de Google.");
                }
            } catch (error) {
                actualizarEstado("Error al procesar los datos recibidos.");
                console.error(error);
            }
        }

        function guardarLibro() {
            let biblioteca = JSON.parse(localStorage.getItem('misLibros')) || [];
            biblioteca.push(libroActual);
            localStorage.setItem('misLibros', JSON.stringify(biblioteca));
            actualizarEstado("¡Libro guardado en tu colección!");
            document.getElementById('resultado').style.display = 'none';
        }
    </script>
</body>
</html>
