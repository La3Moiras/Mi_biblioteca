<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mi Biblioteca v1.3.0</title>
    <!-- Cargamos los estilos y el cerebro de la app de forma externa y segura -->
    <link rel="stylesheet" href="https://jsdelivr.net">
    <script src="https://jsdelivr.net" defer></script>
</head>
<body>
    <div class="container">
        <!-- Pestaña del Escáner -->
        <div id="sec-escaner" class="seccion activa">
            <h1>Mi Biblioteca</h1>
            <div class="version-tag">Versión de la App: v1.3.0</div>
            
            <div id="info-estado">Presiona el botón para iniciar el escáner</div>
            <button id="btn-iniciar" onclick="comenzarEscaneoEnVivo()">Iniciar Escáner en Vivo</button>
            
            <div id="video-container">
                <video id="webcam" autoplay playsinline></video>
                <div class="laser"></div>
            </div>

            <div id="isbn-bloque">ISBN: <span id="num-isbn">Ninguno</span></div>

            <div id="resultado" class="card">
                <h2 id="libro-titulo"></h2>
                <p id="libro-autor"></p>
                <img id="libro-portada" src="" alt="Portada">
                <div style="margin-top: 20px;">
                    <button id="btn-guardar" onclick="guardarLibro()">Guardar en Biblioteca</button>
                </div>
            </div>
        </div>

        <!-- Pestaña de la Estantería -->
        <div id="sec-estanteria" class="seccion">
            <h1>Mis Libros Guardados</h1>
            <div class="version-tag">Listado de tu colección local</div>
            <div id="lista-vacia">Aún no has guardado ningún libro. ¡Ve a la pestaña Escáner!</div>
            <div id="contenedor-estanteria" class="estanteria"></div>
        </div>
    </div>

    <!-- Menú de navegación inferior -->
    <nav class="nav-bar">
        <button id="btn-nav-esc" class="nav-btn activo" onclick="cambiarPestaña('escaner')">📷 Escáner</button>
        <button id="btn-nav-est" class="nav-btn" onclick="cambiarPestaña('estanteria')">📚 Mi Estantería</button>
    </nav>
</body>
</html>
